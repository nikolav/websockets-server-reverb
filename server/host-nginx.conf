upstream reverb8080 {
  server 127.0.0.1:8080;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name qyilcewitexjndalxkexol.online www.qyilcewitexjndalxkexol.online;

  server_tokens off;
  client_max_body_size 10m;

  add_header X-Content-Type-Options "nosniff"     always;
  add_header X-Frame-Options        "DENY"        always;
  add_header Referrer-Policy        "no-referrer" always;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # 1) ws endpoint for clients
  location ^~ /app/ {

    # whitelisted only
    # if ($origin_allowed = 0) {
    #   return 403;
    # }

    proxy_http_version 1.1;
    proxy_pass http://reverb8080;

    ## ws
    # proxy_set_header Upgrade     $http_upgrade;
    # proxy_set_header Connection  $connection_upgrade;
    proxy_set_header Connection "";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # some ws stacks rely on seeing the origin
    proxy_set_header Origin $http_origin;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    proxy_buffering off;
  }

  # 2) publish api endpoint for your servers
  location ^~ /apps/ {
    # (recommended) restrict backend server IPs
    # allow 1.2.3.4;     # server A
    # allow 5.6.7.8;     # server B
    # allow 10.0.0.0/8;  # if private network
    # deny all;

    # basic auth protection; ensure remote apps send basic auth
    auth_basic "Reverb Publish API";
    auth_basic_user_file /etc/nginx/.reverb_htpasswd;

    proxy_http_version 1.1;
    proxy_pass http://reverb8080;

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    proxy_read_timeout  60s;
    proxy_send_timeout  60s;
  }

  # deny other
  location / {
    return 404;
  }
}
